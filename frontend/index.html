<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant AI - Kerala Edition</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- MOCK LOGIN OVERLAY -->
    <div id="loginOverlay" class="login-overlay">
        <div class="glass-panel login-box">
            <div class="logo">
                <span class="icon">🌿</span>
                <h1>Plant AI</h1>
            </div>
            <h2 id="loginTitle">Welcome Back</h2>
            <p class="login-subtitle">Enter your credentials to access the system</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Login to Dashboard</button>
            </form>

            <div class="auth-divider"><span>or</span></div>
            <div id="googleButtonWrapper" class="google-btn-wrap"></div>
            <p class="google-hint">Google sign-in is enabled when backend <code>GOOGLE_CLIENT_ID</code> is configured.</p>

            <div class="login-footer">
                <p id="toggleText">New to Plant AI? <a href="#" id="toggleAuth">Register Account</a></p>
            </div>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display: none;">

        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <span class="icon">🌿</span>
                <h1>Plant AI <span style="font-size: 0.6em; color: var(--accent); opacity: 0.8;">Stage 2</span></h1>
            </div>
        </header>

        <main class="content-grid">

            <!-- Center: Input Form -->
            <section class="glass-panel form-panel">
                <h2>Health Assessment</h2>
                <form id="assessmentForm">

                    <!-- Region Selector -->
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label for="region">Region Context</label>
                        <select id="region" required style="border: 2px solid var(--accent);">
                            <option value="Kerala" selected>Kerala (Tropical Wet)</option>
                            <option value="Rest of India">Rest of India (Generic)</option>
                            <option value="Other">Other / Global</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="plant_type">Plant Type</label>
                        <input id="plant_type" type="text" required placeholder="Type your plant name (e.g., rice)">
                    </div>

                    <div class="section-divider">Environment</div>

                    <div class="form-group">
                        <label for="city">City / Location</label>
                        <input type="text" id="city" placeholder="Ex: Kochi" required style="width: 100%;">
                    </div>

                    <!-- Hidden Scientific Inputs (Auto-filled) -->
                    <div id="scientific-inputs" style="display:none;">
                        <input type="number" id="temperature" step="0.1">
                        <input type="number" id="humidity" step="1">
                        <input type="number" id="rainfall" step="1">
                    </div>

                    <!-- User Friendly Inputs -->
                    <div class="input-grid">
                        <div class="form-group">
                            <label>Soil Type</label>
                            <div class="radio-group">
                                <label><input type="radio" name="soil_type" value="sandy"> Sandy</label>
                                <label><input type="radio" name="soil_type" value="clay"> Clay</label>
                                <label><input type="radio" name="soil_type" value="loamy"> Loamy</label>
                                <label><input type="radio" name="soil_type" value="red" checked> Red Laterite</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Water Availability</label>
                            <div class="radio-group">
                                <label><input type="radio" name="watering" value="low"> Low (3-4 Days)</label>
                                <label><input type="radio" name="watering" value="medium" checked> Medium (2
                                    Days)</label>
                                <label><input type="radio" name="watering" value="high"> High (Daily)</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Plant Location</label>
                            <div class="radio-group">
                                <label><input type="radio" name="location" value="indoor"> Indoor</label>
                                <label><input type="radio" name="location" value="outdoor" checked> Outdoor</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="analyzeBtn">Analyze</button>
                </form>
            </section>
        </main>

    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <div id="resultsContent">
                <div class="score-ring">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__circle" stroke="var(--accent)" stroke-width="8" fill="transparent"
                            r="52" cx="60" cy="60" />
                    </svg>
                    <div class="score-text">
                        <span id="suitabilityValue">0</span>%
                        <small>Suitability</small>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <label>Stress Level</label>
                        <span id="stressValue">-</span>
                    </div>
                    <div class="stat-box">
                        <label>Care Priority</label>
                        <span id="careValue">-</span>
                    </div>
                </div>

                <div class="status-message" id="statusMessage"></div>

                <div class="advisory-box">
                    <h3>Smart Advisory</h3>
                    <p id="smartAdvisory">-</p>
                </div>

                <div class="recommendation-box">
                    <h3>Recommendations</h3>
                    <ul id="recommendationList"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="static/script.js"></script>
</body>

</html>
